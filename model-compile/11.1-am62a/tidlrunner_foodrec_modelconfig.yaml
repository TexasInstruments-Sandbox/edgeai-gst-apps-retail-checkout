task_type: detection
input_dataset: coco
dataloader:
  # name: coco_detection_dataloader
  # path: ./data/datasets/vision/coco
  name: image_files_dataloader
  path: ./data/datasets/vision/food-rec/images
preprocess:
  resize:
  - 512
  - 512
  crop:
  - 512
  - 512
  data_layout: NCHW
  reverse_channels: false
  backend: cv2
  interpolation: null
  resize_with_pad: false
  pad_color: 0
session:
